# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All services run in Docker (no native npm processes).
# Set these env vars before running (or use a .env file):
#   POSTGRES_PASSWORD, JWT_SECRET, ENCRYPTION_KEY, SMTP_*, EMAIL_FROM

services:
  postgres:
    restart: always
    # No port exposure in prod — postgres is internal-only

  backend:
    restart: always
    build:
      context: ./backend
      target: prod
    environment:
      NODE_ENV: production
      # NODE_ENV=production enables SSL for managed cloud DBs (RDS, Cloud SQL, etc.)
      # If using the bundled postgres container (no SSL), override DATABASE_URL with
      # ?sslmode=disable or set NODE_ENV=staging.

  frontend:
    image: nginx:alpine
    restart: always
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"   # HTTPS — mount SSL certs via nginx or a reverse proxy
    depends_on:
      - backend
