<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Litabase — a lightweight SQL workbench for exploring and visualising database data." />
  <meta name="theme-color" content="#1e1e2e" />
  <title>Litabase</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <noscript>
    <p class="noscript-msg">Litabase requires JavaScript. Please enable it in your browser settings.</p>
  </noscript>

  <%- include('partials/_auth.html') %>

  <div id="app" class="app hidden">

    <header id="header">
      <div class="header-brand">
        <span class="header-logo">◈</span>
        <div>
          <div class="header-app-name">Litabase</div>
          <div class="header-tagline">SQL workbench &amp; data explorer</div>
        </div>
      </div>
      <div class="header-right">
        <span id="user-name" class="user-name"></span>
        <button type="button" id="logout-btn" class="btn-link">Logout</button>
        <button type="button" id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">☰</button>
      </div>
    </header>

    <div class="app-layout">
      <%- include('partials/_sidebar.html') %>
      <main class="main-content" role="main">
        <%- include('partials/_pages.html') %>
      </main>
    </div>

  </div>

  <%- include('partials/_modal.html') %>

  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Vite resolves the full import graph from this single entry point -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
