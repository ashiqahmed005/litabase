<!-- Native <dialog> gives us: focus trapping, ESC key, ::backdrop, aria-modal — for free. -->
<dialog id="modal" aria-labelledby="modal-title">
  <div class="modal-header">
    <h2 id="modal-title"></h2>
    <button type="button" class="modal-close" id="modal-close-btn" aria-label="Close dialog">×</button>
  </div>
  <div id="modal-body" class="modal-body"></div>
</dialog>
