<div id="auth-screen" class="auth-screen">
  <div class="auth-card">

    <div class="auth-logo" aria-hidden="true">
      <span class="logo-icon">◈</span>
      <span class="logo-text">Litabase</span>
    </div>
    <h1 class="sr-only">Sign in to Litabase</h1>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-tab="login">Login</button>
      <button type="button" class="auth-tab" data-tab="register">Register</button>
    </div>

    <form id="login-form" class="auth-form" novalidate>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com"
               autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Your password"
               autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
      <p id="login-error" class="form-error" role="alert"></p>
    </form>

    <form id="register-form" class="auth-form hidden" novalidate>
      <div class="form-group">
        <label for="reg-name">Full name</label>
        <input type="text" id="reg-name" placeholder="Jane Smith"
               autocomplete="name" required />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com"
               autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Minimum 8 characters"
               autocomplete="new-password" required minlength="8" />
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
      <p id="register-error" class="form-error" role="alert"></p>
    </form>

  </div>
</div>
